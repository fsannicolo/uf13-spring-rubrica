<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <title>Lista contatti</title>
</head>
<body>
    <header class="p-3 text-bg-dark">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                <h1>Spring Rubrica</h1>
            </div>
        </div>
    </header>

    <div class="container" style="margin-top: 30px">
        <!-- feedback eliminazione -->
        <div th:if="${deleted != null}" class="col-3 my-2">
            <div class="alert alert-info alert-dismissable fade show d-flex align-items-center" role="alert">
                Contatto eliminato!
                <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>

        <div class="col-4 my-2">
            <a th:href="@{/new}" class="btn btn-primary">Nuovo contatto</a>
        </div>
    
        <header class="my-2">
            <h2 class="mb-4 text-center">Lista contatti</h2>
        </header>
    
        <div>
            <table class="table table-dark table-striped table-bordered table-hover">
                <thead class="table-primary">
                    <th>Nome</th>
                    <th>Cognome</th>
                    <th>Telefono</th>
                    <th>Email</th>
                    <th>Dettagli</th>
                </thead>
                <tbody>
                    <tr th:each="c : ${contacts}">
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.surname}"></td>
                        <td th:text="${c.phone}"></td>
                        <td th:text="${c.email}"></td>
    
                        <!-- operazioni sui contatti -->
                        <td>
                            <a th:href="@{'/contact/delete/'+${c.id}}" method="delete" 
                            class="btn btn-danger"><i class="bi bi-trash"></i> Elimina</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    
        <p th:if="${#lists.isEmpty(contacts)}"> 
            Nessun contatto presente
        </p>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
